services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wheresmymoney
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    image: dockerwheresmymoney:1.0
    depends_on:
      - mysql
    ports:
      - "8080:9090"
    environment:
      SERVER_PORT: 9090
      DB_HOST: mysql

volumes:
  mysql-data: